<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal TIC</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0b2e 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        /* Overlay escuro para melhor contraste */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 80%, rgba(236, 72, 153, 0.15) 0%, transparent 60%),
                        radial-gradient(circle at 80% 20%, rgba(168, 85, 247, 0.1) 0%, transparent 60%);
            pointer-events: none;
        }

        .launcher {
            max-width: 1000px;
            width: 100%;
            text-align: center;
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 52px;
            font-weight: 800;
            background: linear-gradient(135deg, #ffffff, #f9a8d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 12px;
            text-shadow: 0 2px 20px rgba(0,0,0,0.3);
            letter-spacing: -0.5px;
        }

        .sub {
            color: #e2e8f0;
            font-size: 18px;
            margin-bottom: 56px;
            letter-spacing: 1px;
            font-weight: 500;
            text-shadow: 0 1px 4px rgba(0,0,0,0.3);
        }

        .cards {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
            justify-content: center;
        }

        .card {
            background: rgba(20, 20, 45, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 32px;
            padding: 36px 28px;
            width: 260px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
            text-decoration: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
        }

        .card:hover {
            transform: translateY(-10px);
            background: rgba(40, 30, 70, 0.95);
            border-color: #ec4899;
            box-shadow: 0 25px 40px rgba(236, 72, 153, 0.3);
        }

        .card-icon {
            font-size: 56px;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .card h2 {
            font-size: 28px;
            font-weight: 700;
            background: linear-gradient(135deg, #f9a8d4, #ffffff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }

        .card p {
            font-size: 14px;
            color: #cbd5e1;
            line-height: 1.5;
            font-weight: 500;
        }

        @media (max-width: 700px) {
            h1 { font-size: 36px; }
            .cards { gap: 24px; }
            .card { width: 220px; padding: 28px 20px; }
            .card h2 { font-size: 24px; }
        }
    </style>
</head>
<body>
<div class="launcher">
    <h1>✨ Feira das Mulheres ✨</h1>

    <div class="cards">
        <a href="FORM.html" class="card">
            <div class="card-icon">📝</div>
            <h2>Formulário</h2>
        </a>
        <a href="Dashboard.html" class="card">
            <div class="card-icon">📊</div>
            <h2>Dashboard</h2>
        </a>
        <a href="TABELA.html" class="card">
            <div class="card-icon">📈</div>
            <h2>Análise Avançada</h2>
        </a>
    </div>
</div>
</body>
</html>
